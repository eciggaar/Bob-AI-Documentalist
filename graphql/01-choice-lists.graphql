# HRDocument metadata migration - Stage 1
# Create optional choice lists before property templates and class creation.
# Replace OS2 with the target repository symbolic identifier or GUID.
# This file follows the content management GraphQL mutation structure
# provided by the tenant using admCreateChoiceList and choiceListProperties.
#
# Notes:
# - symbolicName is not included because the provided tenant mutation example
#   does not show a symbolic-name input for choice list creation.
# - displayName is used as the stable business identifier in this script set.
# - displayNames are localized with en-us only; add more locales if needed.

mutation CreateHRDocTypeChoiceList {
  admCreateChoiceList(
    repositoryIdentifier: "OS2"
    choiceListProperties: {
      dataType: STRING
      displayName: "HR Document DocType Choice List"
      descriptiveText: "Choice list for HR document type values"
      choiceValues: {
        replace: [
          {
            insertAction: {}
            choiceType: STRING
            choiceStringValue: "JobApplication"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "JobApplication" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "InterviewNotes"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "InterviewNotes" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "EmploymentContract"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "EmploymentContract" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "IDDocument"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "IDDocument" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "PersonalInfo"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "PersonalInfo" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "Payslip"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "Payslip" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "SalaryInfo"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "SalaryInfo" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "PerformanceReview"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "PerformanceReview" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "TrainingRecord"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "TrainingRecord" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "DisciplinaryRecord"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "DisciplinaryRecord" }
              ]
            }
          }
          {
            choiceType: STRING
            choiceStringValue: "ExitDocument"
            displayNames: {
              replace: [
                { localeName: "en-us", localizedText: "ExitDocument" }
              ]
            }
          }
        ]
      }
    }
  ) {
    id
    displayName
  }
}

