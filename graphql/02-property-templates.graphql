# HRDocument metadata migration - Stage 2
# Create property templates for all custom HRDocument properties.
# Replace OS2 with the target repository symbolic identifier or GUID.
# Replace CHOICE_LIST_ID_* placeholders with actual choice list object ids where used.
# This file follows the tenant mutation structure using admCreatePropertyTemplate.
#
# Notes:
# - dataType is passed at the mutation level.
# - displayNames are localized with en-us.
# - String properties use subPropertyTemplateStringProperties.
# - Choice-list binding is added only for fields intended to use controlled values.

mutation CreateFirstNamePropertyTemplate {
  admCreatePropertyTemplate(
    repositoryIdentifier: "OS2"
    dataType: STRING
    propertyTemplateProperties: {
      cardinality: SINGLE
      displayNames: {
        replace: [
          {
            localeName: "en-us"
            localizedText: "First Name"
          }
        ]
      }
      symbolicName: "FirstName"

    }
  ) {
    id
  }
}

